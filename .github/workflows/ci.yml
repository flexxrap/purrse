name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node 24 runner for GH actions

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: budget_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - run: ruff check app/
      - run: bandit -r app/ -ll -x app/tests/

      - run: pytest --cov=app --cov-report=xml --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost/budget_test
          JWT_SECRET: test-secret-do-not-use-in-prod
          JWT_ALGORITHM: HS256
          BOT_TOKEN: test-bot-token
          FRONTEND_URL: http://localhost:5173

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx eslint src/
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t budget-app:ci ./backend
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: budget-app:ci
          exit-code: "1"
          severity: CRITICAL
          trivyignores: .trivyignore
